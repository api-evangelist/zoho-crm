aid: zoho-crm
name: Zoho CRM
description: Zoho CRM is an AI-powered sales and customer relationship management
  platform from Zoho that helps businesses manage leads, contacts, accounts, deals,
  and customer engagement across multiple channels. The Zoho CRM REST API (currently
  at v8) uses OAuth 2.0 authorization-code flow and provides programmatic access to
  records, modules, users, workflows, analytics, and bulk data operations, with an
  OpenAPI specification published for the API.
type: Index
