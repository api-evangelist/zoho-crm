- aid: zoho-crm:notifications-api-v2
  name: Zoho CRM Notifications API v2
  description: Instant Notifications API for Zoho CRM. Subscribers register a channel
    via POST /crm/v2/actions/watch with a notify_url and a list of module/operation
    events (for example Leads.create, Contacts.edit, Deals.delete, Accounts.all).
    Zoho CRM then POSTs JSON callbacks to the notify_url whenever the subscribed create,
    edit, delete, or all operations occur on records in the subscribed module.
  humanURL: https://www.zoho.com/crm/developer/docs/api/v2/notifications/
  baseURL: https://www.zohoapis.com/crm/v2
  tags:
  - CRM
