}

enum PermissionAction {
  CREATE
  READ
  UPDATE
  DELETE
  IMPORT
  EXPORT
  APPROVE
  CONVERT
  SHARE
  PRINT
}

type Group {
  id: ID!
  name: String!
  description: String
  type: GroupType
  members: [GroupMember]
  createdAt: DateTime
  modifiedAt: DateTime
}

enum GroupType {
  STATIC
  DYNAMIC
  TERRITORY
}

type GroupMember {
  id: ID!
  group: Group!
  user: User
  role: Role
  type: String
}

