}

union EmailRelatable = Lead | Contact | Account | Deal | Case

type EmailTemplate {
  id: ID!
  name: String!
  subject: String
  content: String
  htmlContent: String
  type: String
  category: String
  module: Module
  isAttachmentsEnabled: Boolean
  owner: User
  createdBy: User
  modifiedBy: User
  createdAt: DateTime
  modifiedAt: DateTime
  attachments: [Attachment]
}

# ─────────────────────────────────────────────
# Social Media
# ─────────────────────────────────────────────

type SocialMedia {
  id: ID!
  type: SocialMediaType!
  url: String
