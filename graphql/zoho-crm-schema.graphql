}

enum RuleActionType {
  SEND_EMAIL
  CREATE_TASK
  UPDATE_FIELD
  NOTIFY_USER
  WEBHOOK
  FUNCTION
  TAG_RECORD
}

type AutomationRule {
  id: ID!
  name: String!
  description: String
  module: Module
  trigger: AutomationTrigger!
  criteria: JSON
  executionTime: String
  actions: [RuleAction]
  isActive: Boolean
  createdBy: User
  modifiedBy: User
  createdAt: DateTime
  modifiedAt: DateTime
}

enum AutomationTrigger {
  RECORD_CREATED
  RECORD_EDITED
  RECORD_DELETED
  FIELD_MODIFIED
