"""
Zoho CRM GraphQL Schema
Conceptual schema derived from the Zoho CRM REST API v8.
Covers leads, contacts, accounts, deals, activities, pipelines, modules,
automation, analytics, security, and organizational settings.
"""

scalar DateTime
scalar JSON
scalar Upload

# ─────────────────────────────────────────────
# Core CRM Records
# ─────────────────────────────────────────────

type Lead {
  id: ID!
  firstName: String
  lastName: String!
  email: String
  phone: String
  mobile: String
  company: String
  title: String
  leadSource: String
  leadStatus: String
  industry: String
  annualRevenue: Float
  numberOfEmployees: Int
  rating: String
  website: String
  description: String
  convertedToContact: Contact
  convertedToAccount: Account
  convertedToDeal: Deal
  isConverted: Boolean
  convertedDate: DateTime
  owner: User
  createdBy: User
  modifiedBy: User
  createdAt: DateTime
  modifiedAt: DateTime
  tags: [String]
  customFields: JSON
  activities: [Activity]
  notes: [Note]
  attachments: [Attachment]
  emails: [Email]
  campaigns: [CampaignMember]
}

type Contact {
  id: ID!
  firstName: String
  lastName: String!
  email: String
  phone: String
  mobile: String
  title: String
  department: String
  account: Account
  reportingTo: Contact
  leadSource: String
  description: String
  mailingStreet: String
  mailingCity: String
  mailingState: String
  mailingZip: String
  mailingCountry: String
  otherStreet: String
  otherCity: String
  otherState: String
  otherZip: String
  otherCountry: String
  owner: User
  createdBy: User
  modifiedBy: User
  createdAt: DateTime
  modifiedAt: DateTime
  tags: [String]
  customFields: JSON
  deals: [Deal]
  activities: [Activity]
  notes: [Note]
  attachments: [Attachment]
  emails: [Email]
  campaigns: [CampaignMember]
  cases: [Case]
  socialMedia: [SocialMedia]
}

type Account {
  id: ID!
  name: String!
  website: String
  phone: String
  fax: String
  industry: String
  type: String
  annualRevenue: Float
  numberOfEmployees: Int
  billingStreet: String
  billingCity: String
  billingState: String
  billingZip: String
  billingCountry: String
  shippingStreet: String
  shippingCity: String
  shippingState: String
  shippingZip: String
  shippingCountry: String
  parentAccount: Account
  description: String
  rating: String
  owner: User
  createdBy: User
  modifiedBy: User
  createdAt: DateTime
  modifiedAt: DateTime
  tags: [String]
  customFields: JSON
  contacts: [Contact]
  deals: [Deal]
  activities: [Activity]
  notes: [Note]
  attachments: [Attachment]
  emails: [Email]
  cases: [Case]
  territories: [Territory]
}

type Deal {
  id: ID!
  dealName: String!
  amount: Float
  closingDate: DateTime
  stage: Stage
  pipeline: Pipeline
  probability: Float
  expectedRevenue: Float
  type: String
  leadSource: String
  description: String
  account: Account
  contact: Contact
  owner: User
  createdBy: User
  modifiedBy: User
  createdAt: DateTime
  modifiedAt: DateTime
  tags: [String]
  customFields: JSON
  activities: [Activity]
  notes: [Note]
  attachments: [Attachment]
  emails: [Email]
  products: [Product]
  quotes: [Quote]
}

# ─────────────────────────────────────────────
# Pipeline and Stages
# ─────────────────────────────────────────────

type Stage {
  id: ID!
  name: String!
  probability: Float
  forecastCategory: String
  pipeline: Pipeline
  position: Int
  isDefault: Boolean
}

type Pipeline {
  id: ID!
  name: String!
  stages: [Stage]
  isDefault: Boolean
  createdAt: DateTime
  modifiedAt: DateTime
}

# ─────────────────────────────────────────────
# Activities
# ─────────────────────────────────────────────

type Activity {
  id: ID!
  type: ActivityType!
  subject: String!
  status: String
  dueDate: DateTime
  completedAt: DateTime
  owner: User
  relatedTo: ActivityRelatable
  createdAt: DateTime
  modifiedAt: DateTime
}

enum ActivityType {
  TASK
  EVENT
  CALL
  EMAIL
}

union ActivityRelatable = Lead | Contact | Account | Deal | Case

type Task {
  id: ID!
  subject: String!
  status: String
  priority: String
  dueDate: DateTime
  closedTime: DateTime
  description: String
  owner: User
  contact: Contact
  lead: Lead
  account: Account
  deal: Deal
  createdBy: User
  modifiedBy: User
  createdAt: DateTime
  modifiedAt: DateTime
  tags: [String]
  customFields: JSON
  reminder: Notification
}

type Event {
  id: ID!
  subject: String!
  startDateTime: DateTime
  endDateTime: DateTime
  location: String
  description: String
  allDay: Boolean
  status: String
  owner: User
  contact: Contact
  lead: Lead
  account: Account
  deal: Deal
  participants: [EventParticipant]
  createdBy: User
  modifiedBy: User
  createdAt: DateTime
  modifiedAt: DateTime
  customFields: JSON
  reminder: Notification
}

type EventParticipant {
  id: ID!
  name: String
  email: String
  type: String
  status: String
}

type Call {
  id: ID!
  subject: String!
  callType: String
  callStartTime: DateTime
  callDuration: Int
  callResult: String
  description: String
  owner: User
  contact: Contact
  lead: Lead
  account: Account
  deal: Deal
  createdBy: User
  modifiedBy: User
  createdAt: DateTime
  modifiedAt: DateTime
  customFields: JSON
}

type Note {
  id: ID!
  noteTitle: String
  noteContent: String!
  relatedTo: NoteRelatable
  owner: User
  createdBy: User
  modifiedBy: User
  createdAt: DateTime
  modifiedAt: DateTime
  attachments: [Attachment]
}

union NoteRelatable = Lead | Contact | Account | Deal | Case | Task | Event | Call

# ─────────────────────────────────────────────
# Modules and Fields
# ─────────────────────────────────────────────

type Module {
  id: ID!
  apiName: String!
  moduleName: String!
  singularLabel: String
  pluralLabel: String
  isCustomModule: Boolean
  isEditable: Boolean
  isDeletable: Boolean
  fields: [ModuleField]
  customViews: [CustomView]
  createdAt: DateTime
  modifiedAt: DateTime
}

type ModuleField {
  id: ID!
  apiName: String!
  fieldLabel: String!
  dataType: String!
  isRequired: Boolean
  isCustomField: Boolean
  isEditable: Boolean
  isVisible: Boolean
  maxLength: Int
  decimalPlaces: Int
  pickListValues: [PickListValue]
  defaultValue: String
  module: Module
}

type PickListValue {
  id: ID!
  displayValue: String!
  actualValue: String
  sequenceNumber: Int
  maps: [PickListValueMap]
}

type PickListValueMap {
  id: ID!
  displayValue: String!
  actualValue: String
  module: Module
}

# ─────────────────────────────────────────────
# Segmentation and Campaigns
# ─────────────────────────────────────────────

type Segment {
  id: ID!
  name: String!
  description: String
  criteria: JSON
  recordCount: Int
  module: Module
  createdBy: User
  createdAt: DateTime
  modifiedAt: DateTime
}

type Campaign {
  id: ID!
  campaignName: String!
  type: String
  status: String
  startDate: DateTime
  endDate: DateTime
  expectedRevenue: Float
  budgetedCost: Float
  actualCost: Float
  expectedROI: Float
  actualROI: Float
  numbersSent: Int
