  owner: User
  createdBy: User
  modifiedBy: User
  createdAt: DateTime
  modifiedAt: DateTime
  members: [CampaignMember]
  tags: [String]
  customFields: JSON
}

type CampaignMember {
  id: ID!
  campaign: Campaign!
  lead: Lead
  contact: Contact
  memberStatus: String
