# ─────────────────────────────────────────────
# Users, Roles, and Security
# ─────────────────────────────────────────────

type User {
  id: ID!
  firstName: String
  lastName: String!
  email: String!
  phone: String
  mobile: String
  status: String
  role: Role
  profile: Profile
  territories: [Territory]
  groups: [Group]
  reportingTo: User
  currency: CurrencyList
  language: String
  locale: String
  timeZone: String
  dateFormat: String
  timeFormat: String
  isAdmin: Boolean
  createdAt: DateTime
  modifiedAt: DateTime
}

type Role {
  id: ID!
  name: String!
  displayLabel: String
  description: String
  parentRole: Role
  shareDataWithPeers: Boolean
  forecastManager: User
  adminUser: User
  users: [User]
}

type UserRole {
  id: ID!
  user: User!
  role: Role!
  assignedAt: DateTime
  assignedBy: User
}

type Profile {
  id: ID!
  name: String!
  description: String
  isDefaultProfile: Boolean
  permissions: [Permission]
  users: [User]
  createdAt: DateTime
  modifiedAt: DateTime
}

type Permission {
  id: ID!
  name: String!
  displayLabel: String
